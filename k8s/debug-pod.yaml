apiVersion: v1
kind: Pod
metadata:
  name: debug-backend
spec:
  containers:
  - name: debug-container
    image: 397920213006.dkr.ecr.us-east-1.amazonaws.com/instamart-backend:v1
    command: ["sleep", "3600"]
    env:
    - name: SPRING_DATASOURCE_URL
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: DB_URL
    - name: SPRING_DATASOURCE_USERNAME
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: DB_USERNAME
    - name: SPRING_DATASOURCE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: DB_PASSWORD
  restartPolicy: Never
