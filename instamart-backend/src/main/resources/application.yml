spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:instamart}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:instamart_super_secret_key_must_be_256_bits_long_replace_in_prod}
    expiration-ms: 86400000   # 1 day

server:
  port: 8080

logging:
  level:
    com.instamart: DEBUG

cors:
  allowed-origin: ${FRONTEND_URL:http://localhost:5173}
